<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Registrations — CampusEvents</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .countdown-box {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .countdown-unit {
      background: var(--bg-subtle, #f0f0f0);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      min-width: 54px;
    }
    .countdown-unit span {
      display: block;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary, #6c63ff);
      line-height: 1;
    }
    .countdown-unit small {
      font-size: 0.65rem;
      color: var(--text-muted, #888);
      text-transform: uppercase;
    }
    .countdown-ended {
      margin-top: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--danger, #e74c3c);
    }
    .countdown-started {
      margin-top: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--success, #27ae60);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="mark">🎓</div>
        <span>CampusEvents</span>
      </div>

      <a href="dashboard.html" class="nav-link">
        <span>📅</span> All Events
      </a>
      <a href="my-registrations.html" class="nav-link active">
        <span>🎟️</span> My Registrations
      </a>
      <a href="create-event.html" class="nav-link" id="createLink" style="display:none">
        <span>➕</span> Create Event
      </a>

      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="info">
            <strong id="userName">Loading…</strong>
            <small id="userRole">—</small>
          </div>
          <button class="btn-logout" id="logoutBtn" title="Logout">⏻</button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2>My Registrations</h2>
          <p>Events you have signed up for</p>
        </div>
      </div>

      <div class="alert alert-error" id="errorMsg"></div>

      <div class="events-grid" id="registrationsGrid">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <script src="js/my-registrations.js"></script>
</body>
</html>
